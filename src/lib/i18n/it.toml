[bookTable] # Sezione per prenotare un tavolo
# Titolo della sezione
title = "Prenota un Tavolo"
# Breve descrizione per prenotare
description = "Siamo aperti tutti i giorni, ad eccezione per la domenica, dalle 19 alle 22:30."
# Email visualizzata sotto il form
email = "trattoria@sottolaluna.it"
# Bottone per prenotare
button = "Prenota su WhatsApp"
# Template del messaggio precompilato per prenotare un tavolo su WhatsApp, con i segnaposto {guests}, {date} e {time} che verranno sostituiti con i dati inseriti dall'utente
messageTemplate = "Ciao! Vorrei prenotare un tavolo per {guests} persone {date} alle {time}.\nAvete un tavolo disponibile?"

[bookTable.phoneNumbers] # Numeri di telefono mostrati nel form per prenotare un tavolo
# Numero visualizzato sotto al form
restaurant = "+39 011 329 3415"
# Numero per prenotare su WhatsApp
reservations = "+39 351 540 0471"

